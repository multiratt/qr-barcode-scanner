<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'JetBrains Mono', monospace; background: #fff; color: #111; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 18px; font-weight: 600; }
        .btn { background: #fff; border: 1px solid #111; padding: 7px 14px; font-family: inherit; font-size: 12px; cursor: pointer; }
        .btn:hover { background: #f0f0f0; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; padding: 12px; border: 1px solid #111; }
        .control-row { display: flex; align-items: center; gap: 12px; }
        .control-row label { font-size: 12px; min-width: 80px; }
        .shape-btns { display: flex; gap: 0; }
        .shape-btn { padding: 6px 12px; border: 1px solid #111; font-family: inherit; font-size: 11px; cursor: pointer; background: #fff; }
        .shape-btn.active { background: #111; color: #fff; }
        .shape-btn:not(.active):hover { background: #f0f0f0; }
        .focus-slider { flex: 1; height: 4px; -webkit-appearance: none; appearance: none; background: #ccc; outline: none; cursor: pointer; }
        .focus-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #111; cursor: pointer; }
        .focus-label { font-size: 11px; color: #666; min-width: 30px; text-align: right; }
        .tabs { display: flex; gap: 0; margin-bottom: 16px; }
        .tab { flex: 1; padding: 10px; text-align: center; border: 1px solid #111; cursor: pointer; font-size: 12px; }
        .tab.active { background: #111; color: #fff; }
        .tab:not(.active) { background: #fff; }
        .scanner-section { border: 1px solid #111; padding: 14px; margin-bottom: 14px; }
        #reader { width: 100%; }
        #reader video { width: 100% !important; border-radius: 0; object-fit: contain; }
        #qr-shrink-fit { width: 100% !important; }
        #qr-shrink-fit video { width: 100% !important; object-fit: contain; }
        .result-box { background: #f5f5f5; padding: 10px; margin-top: 10px; font-size: 13px; word-break: break-all; }
        .result-box.success { background: #d4edda; }
        .upload-section { display: none; }
        .upload-section.active { display: block; }
        .file-input { width: 100%; padding: 10px; border: 1px solid #111; font-family: inherit; font-size: 12px; }
        #upload-preview { max-width: 100%; margin-top: 10px; display: none; }
        .history-section { margin-top: 20px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history-header h2 { font-size: 13px; font-weight: 600; }
        .history-list { border: 1px solid #111; max-height: 280px; overflow-y: auto; }
        .history-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; }
        .history-item:last-child { border-bottom: none; }
        .history-item .info { flex: 1; }
        .history-item .value { font-size: 12px; font-weight: 600; word-break: break-all; }
        .history-item .meta { font-size: 10px; color: #666; margin-top: 3px; }
        .history-item .delete-btn { background: none; border: none; cursor: pointer; font-size: 15px; padding: 3px; color: #aaa; }
        .history-item .delete-btn:hover { color: #111; }
        .empty-state { padding: 28px; text-align: center; color: #aaa; font-size: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Barcode Scanner</h1>
            <button class="btn" id="exportBtn">Export TXT</button>
        </header>

        <!-- Controls -->
        <div class="controls">
            <div class="control-row">
                <label>Shape</label>
                <div class="shape-btns">
                    <button class="shape-btn active" data-shape="square" onclick="setShape('square')">■ Square</button>
                    <button class="shape-btn" data-shape="tall" onclick="setShape('tall')">▬ Tall</button>
                    <button class="shape-btn" data-shape="wide" onclick="setShape('wide')">▬▬ Wide</button>
                    <button class="shape-btn" data-shape="barcode" onclick="setShape('barcode')">═ Barcode</button>
                </div>
            </div>
            <div class="control-row">
                <label>Focus</label>
                <input type="range" class="focus-slider" id="focusSlider" min="0" max="100" value="50" oninput="updateFocus(this.value)">
                <span class="focus-label" id="focusLabel">50</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="camera">📷 Camera</div>
            <div class="tab" data-tab="upload">🖼️ Upload</div>
        </div>

        <div class="scanner-section camera-section active">
            <div id="reader"></div>
            <div id="cameraResult" class="result-box hidden"></div>
        </div>

        <div class="scanner-section upload-section">
            <input type="file" id="fileInput" class="file-input" accept="image/*">
            <img id="upload-preview" alt="Preview">
            <div id="uploadResult" class="result-box hidden"></div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h2>History</h2>
                <button class="btn" id="clearAllBtn">Clear All</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">No scanned items yet</div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'barcode_history';
        const SCAN_COOLDOWN_MS = 3000;
        let html5QrCode;
        let cameraActive = false;
        let lastScanned = { value: '', timestamp: 0 };
        let currentShape = 'square';

        // Shape presets (width x height)
        const SHAPES = {
            square:  { width: 220, height: 220 },
            tall:     { width: 180, height: 280 },
            wide:    { width: 320, height: 180 },
            barcode: { width: 360, height: 80 }
        };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.scanner-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                if (target === 'camera') {
                    document.querySelector('.camera-section').classList.add('active');
                    startCamera();
                } else {
                    document.querySelector('.upload-section').classList.add('active');
                    stopCamera();
                }
            });
        });

        // Shape selector
        function setShape(shape) {
            currentShape = shape;
            document.querySelectorAll('.shape-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.shape === shape);
            });
            if (cameraActive && html5QrCode) {
                // Restart with new shape
                restartCamera();
            }
        }

        // Focus control — apply via JS to video track
        function updateFocus(val) {
            document.getElementById('focusLabel').textContent = val;
            if (html5QrCode && cameraActive) {
                const track = html5QrCode.getRunningTrackSettings();
                if (track && 'focusMode' in track) {
                    // Try continuous focus first, then manual if supported
                    try {
                        html5QrCode.applyVideoConstraints({
                            advanced: [{ focusMode: 'continuous' }]
                        });
                    } catch(e) {}
                }
                // Apply manual focus distance (0.0 - 1.0)
                try {
                    html5QrCode.applyVideoConstraints({
                        advanced: [{ focusDistance: parseInt(val) / 100 }]
                    });
                } catch(e) {}
            }
        }

        // Load history
        function getHistory() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
            catch { return []; }
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function addToHistory(value, type) {
            const history = getHistory();
            history.unshift({ value, type, time: new Date().toLocaleString() });
            saveHistory(history);
            renderHistory();
        }

        function deleteItem(index) {
            const history = getHistory();
            history.splice(index, 1);
            saveHistory(history);
            renderHistory();
        }

        function clearAll() {
            saveHistory([]);
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div class="empty-state">No scanned items yet</div>';
                return;
            }
            list.innerHTML = history.map((item, i) => `
                <div class="history-item">
                    <div class="info">
                        <div class="value">${escapeHtml(item.value)}</div>
                        <div class="meta">${item.type} | ${item.time}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${i})">×</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Export
        document.getElementById('exportBtn').addEventListener('click', () => {
            const history = getHistory();
            if (history.length === 0) { alert('No items to export'); return; }
            const content = history.map(h => `${h.value} | ${h.type} | ${h.time}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'barcode_history.txt';
            a.click();
        });

        document.getElementById('clearAllBtn').addEventListener('click', clearAll);

        // Build scan config
        function getScanConfig() {
            const shape = SHAPES[currentShape];
            return {
                fps: 4,
                qrbox: { width: shape.width, height: shape.height },
                aspectRatio: currentShape === 'tall' ? 0.6 : (currentShape === 'wide' ? 1.8 : 1.0),
                formatsToSupport: [
                    Html5QrcodeScannerFormat.CODE_128,
                    Html5QrcodeScannerFormat.CODE_39,
                    Html5QrcodeScannerFormat.CODE_93,
                    Html5QrcodeScannerFormat.CODABAR,
                    Html5QrcodeScannerFormat.EAN_13,
                    Html5QrcodeScannerFormat.EAN_8,
                    Html5QrcodeScannerFormat.UPC_A,
                    Html5QrcodeScannerFormat.UPC_E,
                    Html5QrcodeScannerFormat.ITF,
                    Html5QrcodeScannerFormat.QR_CODE
                ]
            };
        }

        async function startCamera() {
            if (cameraActive) return;
            try {
                html5QrCode = new Html5Qrcode("reader");

                const cameras = await Html5Qrcode.getCameras();
                let cameraId = null;
                if (cameras && cameras.length > 0) {
                    const back = cameras.find(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear'));
                    cameraId = back ? back.id : cameras[0].id;
                }

                const onScanSuccess = (decodedText, decodedResult) => {
                    const now = Date.now();
                    const isDuplicate = (decodedText === lastScanned.value) && (now - lastScanned.timestamp < SCAN_COOLDOWN_MS);
                    if (isDuplicate) return;
                    lastScanned = { value: decodedText, timestamp: now };
                    showResult('cameraResult', decodedText, decodedResult.result.format.formatName, true);
                    addToHistory(decodedText, decodedResult.result.format.formatName);
                };

                const config = getScanConfig();
                const constraints = {
                    facingMode: "environment",
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                };

                const useDeviceId = cameraId ? { deviceId: { exact: cameraId } } : constraints;

                await html5QrCode.start(useDeviceId, config, onScanSuccess, () => {});

                // Apply focus after camera starts
                setTimeout(() => {
                    const val = parseInt(document.getElementById('focusSlider').value);
                    updateFocus(val);
                }, 1000);

                cameraActive = true;
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('cameraResult').textContent = 'Camera error: ' + err.message;
            }
        }

        async function restartCamera() {
            stopCamera();
            await new Promise(r => setTimeout(r, 500));
            await startCamera();
        }

        function stopCamera() {
            if (html5QrCode && cameraActive) {
                html5QrCode.stop().then(() => { cameraActive = false; }).catch(() => {});
            }
        }

        // Image upload scanner
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('upload-preview');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                try {
                    const shape = SHAPES[currentShape];
                    const scanner = new Html5Qrcode("upload-preview");
                    const result = await scanner.scanFile(file, false, {
                        fps: 4,
                        qrbox: { width: shape.width, height: shape.height },
                        supportedFormats: [
                            Html5QrcodeScannerFormat.CODE_128,
                            Html5QrcodeScannerFormat.CODE_39,
                            Html5QrcodeScannerFormat.CODE_93,
                            Html5QrcodeScannerFormat.CODABAR,
                            Html5QrcodeScannerFormat.EAN_13,
                            Html5QrcodeScannerFormat.EAN_8,
                            Html5QrcodeScannerFormat.UPC_A,
                            Html5QrcodeScannerFormat.UPC_E,
                            Html5QrcodeScannerFormat.ITF,
                            Html5QrcodeScannerFormat.QR_CODE
                        ]
                    });
                    if (result.length > 0) {
                        const r = result[0];
                        showResult('uploadResult', r.text, r.format, true);
                        addToHistory(r.text, r.format);
                    }
                } catch (err) {
                    const el = document.getElementById('uploadResult');
                    el.textContent = 'No barcode found — try clearer image';
                    el.classList.remove('hidden');
                    el.classList.remove('success');
                }
            };
            reader.readAsDataURL(file);
        });

        function showResult(elementId, text, type, success) {
            const el = document.getElementById(elementId);
            el.textContent = success ? `✓ ${text} (${type})` : `${text} (${type})`;
            el.classList.remove('hidden');
            el.classList.toggle('success', !!success);
        }

        // Init
        renderHistory();
        startCamera();
    </script>
</body>
</html>
