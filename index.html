<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'JetBrains Mono', monospace; background: #fff; color: #111; min-height: 100vh; padding: 24px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 20px; font-weight: 600; }
        .btn { background: #fff; border: 1px solid #111; padding: 8px 16px; font-family: inherit; font-size: 12px; cursor: pointer; }
        .btn:hover { background: #f5f5f5; }
        .tabs { display: flex; gap: 0; margin-bottom: 16px; }
        .tab { flex: 1; padding: 12px; text-align: center; border: 1px solid #111; cursor: pointer; font-size: 13px; }
        .tab.active { background: #111; color: #fff; }
        .tab:not(.active) { background: #fff; }
        .scanner-section { border: 1px solid #111; padding: 16px; margin-bottom: 16px; }
        #reader { width: 100%; }
        #reader video { width: 100% !important; border-radius: 0; object-fit: contain; }
        .result-box { background: #f5f5f5; padding: 12px; margin-top: 12px; font-size: 14px; word-break: break-all; }
        .result-box.success { background: #d4edda; }
        .upload-section { display: none; }
        .upload-section.active { display: block; }
        .file-input { width: 100%; padding: 12px; border: 1px solid #111; font-family: inherit; font-size: 13px; }
        #upload-preview { max-width: 100%; margin-top: 12px; display: none; }
        .history-section { margin-top: 24px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .history-header h2 { font-size: 14px; font-weight: 600; }
        .history-list { border: 1px solid #111; max-height: 300px; overflow-y: auto; }
        .history-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; }
        .history-item:last-child { border-bottom: none; }
        .history-item .info { flex: 1; }
        .history-item .value { font-size: 13px; font-weight: 600; word-break: break-all; }
        .history-item .meta { font-size: 11px; color: #666; margin-top: 4px; }
        .history-item .delete-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; color: #999; }
        .history-item .delete-btn:hover { color: #111; }
        .empty-state { padding: 32px; text-align: center; color: #999; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Barcode Scanner</h1>
            <button class="btn" id="exportBtn">Export TXT</button>
        </header>

        <div class="tabs">
            <div class="tab active" data-tab="camera">Camera</div>
            <div class="tab" data-tab="upload">Upload</div>
        </div>

        <div class="scanner-section camera-section active">
            <div id="reader"></div>
            <div id="cameraResult" class="result-box hidden"></div>
        </div>

        <div class="scanner-section upload-section">
            <input type="file" id="fileInput" class="file-input" accept="image/*">
            <img id="upload-preview" alt="Preview">
            <div id="uploadResult" class="result-box hidden"></div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h2>History</h2>
                <button class="btn" id="clearAllBtn">Clear All</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="empty-state">No scanned items yet</div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'barcode_history';
        const SCAN_COOLDOWN_MS = 3000; // 3 sec cooldown before same code can be scanned again
        const DIFFERENT_CODE_COOLDOWN_MS = 1500; // 1.5 sec between different codes
        let html5QrCode;
        let cameraActive = false;

        // Deduplication state
        let lastScanned = { value: '', timestamp: 0 };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.scanner-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                const target = tab.dataset.tab;
                if (target === 'camera') {
                    document.querySelector('.camera-section').classList.add('active');
                    startCamera();
                } else {
                    document.querySelector('.upload-section').classList.add('active');
                    stopCamera();
                }
            });
        });

        // Load history
        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch { return []; }
        }

        function saveHistory(history) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        function addToHistory(value, type) {
            const history = getHistory();
            history.unshift({ value, type, time: new Date().toLocaleString() });
            saveHistory(history);
            renderHistory();
        }

        function deleteItem(index) {
            const history = getHistory();
            history.splice(index, 1);
            saveHistory(history);
            renderHistory();
        }

        function clearAll() {
            saveHistory([]);
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            const list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div class="empty-state">No scanned items yet</div>';
                return;
            }
            list.innerHTML = history.map((item, i) => `
                <div class="history-item">
                    <div class="info">
                        <div class="value">${escapeHtml(item.value)}</div>
                        <div class="meta">${item.type} | ${item.time}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(${i})">×</button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Export
        document.getElementById('exportBtn').addEventListener('click', () => {
            const history = getHistory();
            if (history.length === 0) { alert('No items to export'); return; }
            const content = history.map(h => `${h.value} | ${h.type} | ${h.time}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'barcode_history.txt';
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('clearAllBtn').addEventListener('click', clearAll);

        // Camera scanner
        async function startCamera() {
            if (cameraActive) return;
            try {
                html5QrCode = new Html5Qrcode("reader");

                // Try to get available cameras first
                const cameras = await Html5Qrcode.getCameras();
                let cameraId = null;
                if (cameras && cameras.length > 0) {
                    // Prefer back camera
                    const back = cameras.find(c => c.label.toLowerCase().includes('back') || c.label.toLowerCase().includes('rear'));
                    cameraId = back ? back.id : cameras[0].id;
                }

                const config = {
                    fps: 5, // Lower fps for better focus on small barcodes
                    qrbox: { width: 280, height: 150 }, // Wider/shorter box for barcode scanning
                    aspectRatio: 1.5, // Taller preview helps with focusing
                    formatsToSupport: [
                        Html5QrcodeScannerFormat.CODE_128,
                        Html5QrcodeScannerFormat.CODE_39,
                        Html5QrcodeScannerFormat.CODE_93,
                        Html5QrcodeScannerFormat.CODABAR,
                        Html5QrcodeScannerFormat.EAN_13,
                        Html5QrcodeScannerFormat.EAN_8,
                        Html5QrcodeScannerFormat.UPC_A,
                        Html5QrcodeScannerFormat.UPC_E,
                        Html5QrcodeScannerFormat.ITF,
                        Html5QrcodeScannerFormat.QR_CODE
                    ]
                };

                const onScanSuccess = (decodedText, decodedResult) => {
                    const now = Date.now();
                    const isDuplicate = (decodedText === lastScanned.value) &&
                        (now - lastScanned.timestamp < SCAN_COOLDOWN_MS);

                    if (isDuplicate) {
                        // Same code scanned within cooldown — ignore silently
                        return;
                    }

                    lastScanned = { value: decodedText, timestamp: now };
                    showResult('cameraResult', decodedText, decodedResult.result.format.formatName, true);
                    addToHistory(decodedText, decodedResult.result.format.formatName);
                };

                const configToUse = cameraId
                    ? { ...config, deviceId: { exact: cameraId } }
                    : config;

                await html5QrCode.start(
                    cameraId ? { deviceId: { exact: cameraId } } : { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    () => {} // Ignore scan failures (normal when no code visible)
                );
                cameraActive = true;
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('cameraResult').textContent = 'Camera not available: ' + err.message;
            }
        }

        function stopCamera() {
            if (html5QrCode && cameraActive) {
                html5QrCode.stop().then(() => { cameraActive = false; }).catch(() => {});
            }
        }

        // Image upload scanner
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('upload-preview');
        const uploadResult = document.getElementById('uploadResult');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';

                try {
                    const result = await Html5Qrcode.scanFile(file, false, {
                        fps: 5,
                        qrbox: { width: 280, height: 150 },
                        aspectRatio: 1.5,
                        supportedFormats: [
                            Html5QrcodeScannerFormat.CODE_128,
                            Html5QrcodeScannerFormat.CODE_39,
                            Html5QrcodeScannerFormat.CODE_93,
                            Html5QrcodeScannerFormat.CODABAR,
                            Html5QrcodeScannerFormat.EAN_13,
                            Html5QrcodeScannerFormat.EAN_8,
                            Html5QrcodeScannerFormat.UPC_A,
                            Html5QrcodeScannerFormat.UPC_E,
                            Html5QrcodeScannerFormat.ITF,
                            Html5QrcodeScannerFormat.QR_CODE
                        ]
                    });
                    if (result.length > 0) {
                        const r = result[0];
                        showResult('uploadResult', r.text, r.format, true);
                        addToHistory(r.text, r.format);
                    }
                } catch (err) {
                    uploadResult.textContent = 'No barcode found — try a clearer image';
                    uploadResult.classList.remove('hidden');
                    uploadResult.classList.remove('success');
                }
            };
            reader.readAsDataURL(file);
        });

        function showResult(elementId, text, type, success) {
            const el = document.getElementById(elementId);
            el.textContent = success ? `✓ ${text} (${type})` : `${text} (${type})`;
            el.classList.remove('hidden');
            el.classList.toggle('success', !!success);
        }

        // Init
        renderHistory();
        startCamera();
    </script>
</body>
</html>
